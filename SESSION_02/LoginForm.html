<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login Form</title>
</head>
<body bgcolor="#fcdbdb">

<br><br><br><br><br><br>
<center>
    <table border="0">
        <tr>
            <td>
                <form id="loginForm" action="#">
                    <fieldset border="1">
                        <legend>
                            <font color="red" size="+2"><i>Log In</i></font>
                        </legend>
                        
                        <table border="0" cellpadding="5">
                            <tr>
                                <td>User Name:</td>
                                <td><input type="text" id="username" name="username" value="Enter your User name here!" size="30"></td>
                            </tr>
                            <tr>
                                <td>PassWord:</td>
                                <td><input type="password" id="password" name="password" size="30"></td>
                            </tr>
                            <tr>
                                <td>Select Your Location:</td>
                                <td>
                                    <select id="location" name="location">
                                        <optgroup label="Africa">
                                            <option value="egypt" selected>Egypt</option>
                                            <option value="sudan">Sudan</option>
                                            <option value="namibia">Namibia</option>
                                        </optgroup>
                                        <optgroup label="Europe">
                                            <option value="france">France</option>
                                            <option value="russia">Russia</option>
                                            <option value="uk">UK</option>
                                        </optgroup>
                                        <optgroup label="North America">
                                            <option value="canada">Canada</option>
                                            <option value="mexico">Mexico</option>
                                            <option value="usa">USA</option>
                                        </optgroup>
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2">
                                    <input type="checkbox" id="remember" name="remember">
                                    <label for="remember"><font size="+1">Remember<u>M</u>e</font></label>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2">
                                    <input type="submit" value="Log In">
                                </td>
                            </tr>
                        </table>
                        
                    </fieldset>
                </form>
            </td>
        </tr>
    </table>
</center>

<script>
    document.getElementById('loginForm').addEventListener('submit', function (event) {
        event.preventDefault();

        var username = document.getElementById('username').value;
        var password = document.getElementById('password').value;
        var location = document.getElementById('location').value;
        var remember = document.getElementById('remember').checked ? 'Yes' : 'No';

        var content =
            'Login Data\n' +
            '==========\n' +
            'Username: ' + username + '\n' +
            'Password: ' + password + '\n' +
            'Location: ' + location + '\n' +
            'Remember Me: ' + remember + '\n';

        var blob = new Blob([content], { type: 'text/plain' });
        var link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'login-data.txt';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
    });
</script>

</body>
</html>
